name: Slicedot Data Ingestion Pipeline

# This dictates when the script runs.
on:
  schedule:
    # Runs at minute 0 past every 4th hour. (e.g., 00:00, 04:00, 08:00 UTC)
    # Adjust this cron syntax to match how often your API updates.
    - cron: '0 */4 * * *'
  # Allows you to click a button in GitHub to run it manually
  workflow_dispatch:

jobs:
  run-ingestion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Engine
        # This injects your secure keys into the environment just for this run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python ingestion_engine.py
